<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0c09">
  <title>Aure Relics Battle Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header" aria-label="Aure Relics banner">
    <img
      class="header-symbol header-symbol-left"
      src="./images/Logo-symbol.png"
      alt=""
      aria-hidden="true"
    >

    <img
      class="header-brand-banner"
      src="./images/Logo-banner.png"
      alt="Aure Relics"
    >

    <img
      class="header-symbol header-symbol-right"
      src="./images/Logo-symbol.png"
      alt=""
      aria-hidden="true"
    >
  </header>

  <div id="appLayout" class="app-layout">
    <aside id="sidebarPanel" class="sidebar" aria-label="Map controls">
      <button id="toggleSidebar" class="panel-collapse-button panel-collapse-left" type="button" aria-label="Collapse map controls" title="Collapse map controls">‹</button>
      <details>
        <summary>Tools</summary>
        <button id="wallTool" class="tool-button" type="button">Void Fill</button>
        <button id="eraseTool" class="tool-button" type="button">Erase</button>
      </details>

      <details>
        <summary>Tokens</summary>
        <button id="playerToken" class="tool-button" type="button">Player</button>
        <button id="enemyToken" class="tool-button" type="button">Enemy</button>
        <button id="npcToken" class="tool-button" type="button">NPC</button>
        <button id="bossToken" class="tool-button" type="button">Boss</button>
      </details>

      <div class="brush-control">
        <label for="brushSize">Brush Size</label>
        <select id="brushSize">
          <option value="1">1x1</option>
          <option value="2">2x2</option>
          <option value="3">3x3</option>
        </select>
      </div>

      <details>
        <summary>Terrain</summary>
        <button id="treeTool" class="tool-button" type="button">Tree</button>
        <button id="rockTool" class="tool-button" type="button">Rock</button>
        <button id="fireTool" class="tool-button" type="button">Fire</button>
        <button id="doorTool" class="tool-button" type="button">Door</button>
        <button id="waterTool" class="tool-button" type="button">Water</button>
        <button id="houseTool" class="tool-button" type="button">House</button>
        <button id="stairsTool" class="tool-button" type="button">Stairs</button>
        <button id="chestTool" class="tool-button" type="button">Chest</button>
        <button id="treeCanopyTool" class="tool-button" type="button">Tree Canopy</button>
        <button id="boulderTool" class="tool-button" type="button">Boulder</button>
        <button id="stoneFormationTool" class="tool-button" type="button">Stone Formation</button>
        <button id="brushThicketTool" class="tool-button" type="button">Brush Thicket</button>
        <button id="ruinedWallTool" class="tool-button" type="button">Ruined Wall</button>
        <button id="stonePillarTool" class="tool-button" type="button">Stone Pillar</button>
        <button id="crateStackTool" class="tool-button" type="button">Crate Stack</button>
        <button id="pondTool" class="tool-button" type="button">Pond / Pool</button>
        <button id="clearGrid" type="button">Clear Grid</button>
      </details>

      <details>
        <summary>Scene Theme</summary>
        <label class="sidebar-field" for="sceneTheme">
          Battlefield Background
          <select id="sceneTheme" aria-label="Battlefield background theme">
            <option value="relic">Relic Default</option>
            <option value="stoneDungeon">Stone Dungeon</option>
            <option value="forestFloor">Forest Floor</option>
            <option value="sandDesert">Sand / Desert</option>
            <option value="iceField">Ice Field</option>
            <option value="hellEmber">Hell / Ember</option>
            <option value="cityCobblestone">City / Cobblestone</option>
          </select>
        </label>
        <button id="resetSceneTheme" type="button">Reset Theme</button>
      </details>

      <details>
        <summary>Scenes</summary>
        <input id="mapName" type="text" placeholder="Scene name" aria-label="Scene name" autocomplete="off">
        <button id="saveMap" type="button">Save Scene</button>

        <select id="mapList" aria-label="Saved scenes">
          <option value="">Select Scene</option>
        </select>

        <button id="loadMap" type="button">Load Scene</button>
        <button id="deleteMap" type="button">Delete Scene</button>
        <button id="exportData" type="button">Export Backup</button>
        <button id="importData" type="button">Import Backup</button>
        <input id="importDataFile" class="visually-hidden" type="file" accept="application/json,.json" aria-label="Import Aure Relics backup file">
      </details>

      <details>
        <summary>Help / Tutorial</summary>
        <a class="sidebar-link" href="./Aure-Relics-Tutorial.md" target="_blank" rel="noopener">Open Tutorial</a>
        <a class="sidebar-link" href="./README.md" target="_blank" rel="noopener">Open README</a>
      </details>

      <details>
        <summary>Grid Size</summary>
        <input id="gridWidthInput" type="number" min="5" max="80" value="20" placeholder="Width" aria-label="Grid width">
        <input id="gridHeightInput" type="number" min="5" max="80" value="20" placeholder="Height" aria-label="Grid height">
        <button id="applyGridSize" type="button">Apply Grid Size</button>
      </details>
    </aside>

    <main class="battle-stage" aria-label="Battlefield">
      <section class="battlefield-meta" aria-label="Scene information">
        <div id="currentScene" aria-live="polite">No Scene Loaded</div>
        <div id="gridInfo" aria-live="polite">20 × 20</div>
      </section>

      <section id="battlefieldLayout" class="battlefield-layout no-players no-opponents">
        <aside id="playerStatusBoard" class="hud-rail player-hud-rail" aria-label="Player HUD"></aside>

        <section class="map-region" aria-label="Battle map area">
          <div class="grid-frame">
            <div id="grid" aria-label="Battle grid"></div>
          </div>
        </section>

        <aside id="enemyStatusStrip" class="hud-rail opponent-hud-rail" aria-label="Enemy, NPC, and boss HUD"></aside>
      </section>
    </main>

    <aside id="rightPanel" class="right-panel" aria-label="Combat tracker">
      <button id="toggleTracker" class="panel-collapse-button panel-collapse-right" type="button" aria-label="Collapse combat tracker" title="Collapse combat tracker">›</button>
      <h3>Combat Tracker</h3>

      <details id="turnOrderPanel" class="turn-order-panel tracker-section tracker-order-section">
        <summary>Turn Order</summary>
        <div id="initiativeList" aria-live="polite"></div>
      </details>

      <button id="nextTurn" class="next-turn-button" type="button">Next Turn</button>

      <details class="initiative-setup-panel">
        <summary>Initiative Setup</summary>

        <div id="initiativeSetup"></div>

        <div class="tracker-actions" aria-label="Initiative setup actions">
          <button id="groupSelected" type="button">Group Selected</button>
          <button id="sortInitiative" type="button">Sort Initiative</button>
          <button id="clearInitiative" type="button">Clear Initiative</button>
        </div>
      </details>

      <div id="tieResolver" class="tie-resolver hidden">
        <h3>Tie Breaker</h3>
        <p>Who has higher Dex or won the roll off?</p>
        <div id="tieOrderList"></div>
        <button id="confirmTieOrder" type="button">Confirm Tie Order</button>
      </div>
    </aside>
  </div>

  <section id="dmWorkspace" class="dm-workspace collapsed" aria-label="DM notes and history">
    <div class="dm-workspace-header">
      <div class="dm-workspace-tabs" role="tablist" aria-label="DM workspace tabs">
        <button id="dmNotesTab" class="dm-tab active" type="button">DM Notes</button>
        <button id="dmHistoryTab" class="dm-tab" type="button">History</button>
      </div>
      <button id="toggleDmWorkspace" class="dm-workspace-toggle" type="button" aria-label="Expand DM workspace">DM Panel ▲</button>
    </div>

    <div id="dmNotesPanel" class="dm-panel active">
      <textarea id="dmNotesText" placeholder="Session notes, lore, reminders, enemy plans, loot, secrets..." aria-label="DM notes"></textarea>
    </div>

    <div id="dmHistoryPanel" class="dm-panel">
      <div id="dmHistoryLog" class="dm-history-log" aria-live="polite"></div>
    </div>
  </section>


  <div id="combatantModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Edit Combatant</h2>
        <button id="modalClose" class="icon-button" type="button" aria-label="Close details">×</button>
      </div>

      <input id="modalTokenLabel" type="hidden">

      <div class="modal-grid-row modal-identity-row">
        <label class="modal-field">
          Name
          <input id="modalName" type="text" autocomplete="off">
        </label>

        <label class="modal-field">
          Class / Role
          <input id="modalClass" type="text" autocomplete="off" placeholder="Warlock">
        </label>
      </div>

      <div class="modal-grid-row">
        <label class="modal-field">
          Current HP
          <input id="modalHp" type="text" inputmode="numeric" autocomplete="off">
        </label>

        <label class="modal-field">
          Max HP
          <input id="modalMaxHp" type="text" inputmode="numeric" autocomplete="off">
        </label>

        <label class="modal-field">
          Temp HP
          <input id="modalTempHp" type="text" inputmode="numeric" autocomplete="off">
        </label>
      </div>

      <label class="modal-field">
        Status
        <select id="modalStatus"></select>
      </label>

      <label class="modal-field">
        Buff / Debuff
        <select id="modalBuff"></select>
      </label>

      <fieldset class="modal-visibility-options">
        <legend>Table Visibility</legend>

        <label>
          <input id="modalShowRole" type="checkbox">
          Show class/role on table view
        </label>

        <label>
          <input id="modalShowHp" type="checkbox">
          Show HP on table view
        </label>

        <label>
          <input id="modalShowStatus" type="checkbox">
          Show status/debuff on table view
        </label>

        <label>
          <input id="modalShowBuff" type="checkbox">
          Show buff on table view
        </label>
      </fieldset>

      <div class="modal-actions">
        <button id="modalSave" type="button">Save Details</button>
        <button id="modalCancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
