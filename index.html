<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aure Relics Battle Grid</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
<header>
  <div class="brand">
  <img src="./images/Logo-symbol.png" class="brand-symbol" alt="Aure Relics Symbol">
  <img src="./images/Logo-banner.png" class="brand-banner" alt="Aure Relics">
</div>

  <div id="currentScene">No Scene Loaded</div>
</header>

  <!-- MAIN APP LAYOUT -->
<div class="app-layout">

    <!-- LEFT SIDEBAR -->
<aside class="sidebar">

  <details open>
    <summary>Tools</summary>
    <button id="wallTool">Wall</button>
    <button id="eraseTool">Erase</button>
  </details>

  <details open>
    <summary>Tokens</summary>
    <button id="playerToken">Player</button>
    <button id="enemyToken">Enemy</button>
    <button id="npcToken">NPC</button>
    <button id="bossToken">Boss</button>
  </details>

  <div class="brush-control">
    <label for="brushSize">Brush Size</label>
    <select id="brushSize">
      <option value="1">1x1</option>
      <option value="2">2x2</option>
      <option value="3">3x3</option>
    </select>
  </div>

  <details open>
    <summary>Terrain</summary>
    <button id="treeTool">Tree</button>
    <button id="rockTool">Rock</button>
    <button id="fireTool">Fire</button>
    <button id="doorTool">Door</button>
    <button id="waterTool">Water</button>
    <button id="houseTool">House</button>
    <button id="stairsTool">Stairs</button>
    <button id="chestTool">Chest</button>
    <button id="clearGrid">Clear Grid</button>
  </details>

  <details>
    <summary>Scenes</summary>
    <input id="mapName" placeholder="Scene name" />
    <button id="saveMap">Save Scene</button>

    <select id="mapList">
      <option value="">Select Scene</option>
    </select>

    <button id="loadMap">Load Scene</button>
    <button id="deleteMap">Delete Scene</button>
  </details>

  <details>
    <summary>Grid Size</summary>
    <input id="gridWidthInput" type="number" min="5" max="80" value="20" placeholder="Width">
    <input id="gridHeightInput" type="number" min="5" max="80" value="20" placeholder="Height">
    <button id="applyGridSize">Apply Grid Size</button>
  </details>

</aside>

    <!-- GRID AREA -->
<main class="grid-stage">

  <section id="playerStatusBoard" class="player-status-board"></section>

  <div class="grid-frame">
  <div id="grid"></div>
  </div>

  <section id="enemyStatusStrip" class="enemy-status-strip"></section>

</main>

    <!-- RIGHT PANEL -->
  <aside class="right-panel">

    <h3>Combat Tracker</h3>

    <div id="initiativeSetup"></div>

    <button id="groupSelected">Group Selected</button>
    <button id="sortInitiative">Sort Initiative</button>
    <button id="nextTurn">Next Turn</button>

    <div id="initiativeList"></div>

    <div id="tieResolver" class="tie-resolver hidden">
      <h3>Tie Breaker</h3>
      <p>Who has higher Dex or won the roll off?</p>
      <div id="tieOrderList"></div>
      <button id="confirmTieOrder">Confirm Tie Order</button>
    </div>

  </aside>

</div>

  <script src="script.js"></script>
</body>
</html>
